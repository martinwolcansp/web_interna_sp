<header class="site-header" role="banner">
  <div>
    <img
      src="https://spseguridad.com.ar/wp-content/uploads/2025/06/SP-Logo-Blanco-2.svg"
      alt="SP Seguridad Privada"
      class="site-header__logo-img"
      onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
    <div class="site-header__logo-fallback">SP <span>Seguridad</span> Privada</div>
    <p class="site-header__sub">{{sub}}</p>
  </div>
  <div class="site-header__right">
    <div class="site-header__title">{{title}}</div>
    <p class="site-header__subtitle">{{subtitle}}</p>
  </div>
</header>
