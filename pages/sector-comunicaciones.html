<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sector Comunicaciones — Piloto | SP Seguridad</title>

  <!-- Iconografía -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">

  <!-- Estilos: tokens → base → componentes → página -->
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/ficha.css">
</head>
<body>

  <!-- HEADER compartido -->
  <div id="site-header"
    data-breadcrumb='[{"label":"Inicio","href":"/index.html"},{"label":"Sector Comunicaciones — Piloto"}]'>
  </div>
  <script src="/components/header/header.js"></script>

  <!-- ══════════════════════════════════════════════════════════
       FICHA DE PRODUCTO — página independiente (una sola ficha,
       sin mapa de segmentos: reutiliza el mismo componente de
       ficha que las páginas de mapa de servicios)
       ══════════════════════════════════════════════════════════ -->
  <div id="app-ficha">
    <div class="ficha-page">

      <!-- VERSION SELECTOR (mismo estilo que en el mapa de servicios) -->
      <div class="mapa-topbar">
        <div class="version-selector" id="ficha-version-selector">
          <button class="version-selector__btn" id="ficha-version-btn"
                  onclick="toggleFichaVersionDropdown()"
                  aria-haspopup="listbox" aria-expanded="false"
                  aria-label="Selector de versión de la ficha">
            <i class="ti ti-git-branch" aria-hidden="true"></i>
            <span id="ficha-version-current-label">Cargando…</span>
            <i class="ti ti-chevron-down version-selector__chevron" aria-hidden="true"></i>
          </button>
          <ul class="version-selector__dropdown" id="ficha-version-dropdown" role="listbox">
            <!-- Renderizado por ficha-renderer.js -->
          </ul>
        </div>
      </div>

      <div class="ficha-wrap" id="ficha-container">
        <!-- renderFichaById() inyecta aquí el contenido -->
      </div>

    </div>
  </div>


  <!-- ══════════════════════════════════════════════════════════
       MODAL DE DETALLE POR ÁREA (ficha de producto → tab Áreas)
       ══════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="area-modal-overlay"
       role="dialog" aria-modal="true" aria-labelledby="area-modal-title"
       onclick="closeAreaDetailOnOverlayClick(event)">
    <div class="modal" id="area-modal-box">
      <header class="modal__header">
        <div>
          <div class="modal__segment-badge" id="area-modal-badge"></div>
          <h2 class="modal__name" id="area-modal-title"></h2>
        </div>
        <button class="modal__close" onclick="closeAreaDetail()" aria-label="Cerrar detalle de área">
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
      </header>
      <div class="modal__body" id="area-modal-body"></div>
    </div>
  </div>


  <!-- Versiones de la ficha (orden cronológico) -->
  <script src="../js/fichas/versiones/nuevas-tecnologias-v1.0.js"></script>
  <script src="../js/fichas/versiones/nuevas-tecnologias-v1.1.js"></script>
  <!-- Renderer -->
  <script src="../js/ficha-renderer.js"></script>
  <!-- Lógica de tabs internos, FAQ y cierre de overlays -->
  <script src="../js/ficha.js"></script>
  <!-- Arranque específico de esta página -->
  <script src="../js/sector-comunicaciones.js"></script>

</body>
</html>
